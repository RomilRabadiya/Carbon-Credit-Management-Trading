          predicates:
            - Path=/api/emissions/**
        - id: core-service-credits
          uri: http://localhost:8082
          predicates:
            - Path=/api/credits/**
        - id: core-service-verifications
          uri: http://localhost:8082
          predicates:
            - Path=/api/verifications/**
        - id: trade-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/trading/**

