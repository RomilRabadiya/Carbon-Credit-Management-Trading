server:
  port: 8082

spring:
  application:
    name: carbon-core-service
  datasource:
    url: jdbc:postgresql://localhost:5432/carbon_core
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
